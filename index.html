<!DOCTYPE html>
<html>
<head>
  <title>Mannam Video Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f5f5f5;
    }

    .card {
      background: #ffffff;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <h1>Video Analytics</h1>

  <div class="card">
    <h2>Total Plays</h2>
    <h3 id="total">Loading...</h3>
  </div>

  <div class="card">
    <h2>Top Products</h2>
    <div id="products"></div>
  </div>

  <script>
    const client = window.supabase.createClient(
      "https://mifwwaikvumjurgraslk.supabase.co",
      "sb_publishable_MGFP0zVIAuJVfwfCAgPQ_A_WI82lx_B"
    );

    async function loadData() {
      const { data, error } = await client
        .from("video_clicks")
        .select("*");

      if (error) {
        console.error(error);
        return;
      }

      document.getElementById("total").innerText = data.length;

      const counts = {};

      data.forEach(function(row) {
        counts[row.product] = (counts[row.product] || 0) + 1;
      });

      const sorted = Object.entries(counts)
        .sort(function(a, b) { return b[1] - a[1]; });

      const container = document.getElementById("products");
      container.innerHTML = "";

      sorted.forEach(function(item) {
        const product = item[0];
        const count = item[1];

        const div = document.createElement("div");
        div.textContent = product + " -> " + count + " plays";

        container.appendChild(div);
      });
    }

    loadData();
  </script>

</body>
</html>
